<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${testimonial.title} + ' — Testimonio'">Testimonio — Latinoamérica Comparte</title>

    <link rel="stylesheet" th:href="@{/styles1.css}">
    <link rel="icon" type="image/png" th:href="@{/images/ecuador.png}">

</head>
<body>

<div class="public-container">

    <a th:href="@{/}" class="btn-back">
        ← Volver al inicio
    </a>

    <article class="card" style="padding: 40px; border-radius: 16px;">


        <header class="story-header">
            <h1 class="story-title" th:text="${testimonial.title}">Título del Testimonio</h1>
            <div class="story-meta">
                Por <strong th:text="${testimonial.author != null ? testimonial.author : 'Anónimo'}">Autor</strong>
                <span th:if="${testimonial.location != null}">• Ubicación: <strong th:text="${testimonial.location}">Otavalo, Ecuador</strong></span>
            </div>
        </header>


        <div th:if="${testimonial.imageUrl != null and !testimonial.imageUrl.isBlank()}" class="story-image-wrapper">
            <img th:src="${testimonial.imageUrl}" class="story-image" alt="Imagen del testimonio">
        </div>


        <div class="story-body">

            <div class="story-summary" th:text="${testimonial.summary}">
                Resumen o copete breve del testimonio...
            </div>


            <div th:text="${testimonial.content}" style="white-space: pre-line;">
                Cuerpo completo de la historia de impacto...
            </div>
        </div>

    </article>
</div>

</body>
</html>
